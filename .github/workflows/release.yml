name: Release

# Cut a release by pushing a version tag, e.g.:
#   git tag v0.2.0 && git push origin v0.2.0
# The Windows installers are built and attached to a DRAFT GitHub Release,
# which you review and publish manually.

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write   # needed to create the GitHub Release

jobs:
  windows:
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust deps
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build app + create release (Tauri)
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          # tauri.conf.json lives in src-tauri/; the CLI finds it from the repo root.
          # No frontend build step (frontendDist is the static src/ folder).
          tagName: ${{ github.ref_name }}
          releaseName: 'Stream Overlay ${{ github.ref_name }}'
          releaseBody: |
            Instalador de Stream Overlay para Windows.

            > La primera vez, Windows SmartScreen puede avisar que la app no es
            > reconocida (todavía no está firmada). Hacé clic en **Más info →
            > Ejecutar de todas formas** para instalar.
          releaseDraft: true
          prerelease: false
