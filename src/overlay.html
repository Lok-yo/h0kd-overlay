<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Stream Overlay</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 1920px;
      height: 1080px;
      overflow: hidden;
      background: transparent;
    }

    #overlay {
      position: relative;
      width: 100%;
      height: 100%;
      overflow: hidden;
    }

    .video-spawn {
      position: absolute;
      pointer-events: none;
      /* La animación de entrada/salida se asigna por instancia (ver IN_ANIMS/OUT_ANIMS). */
    }

    .video-spawn video {
      width: 100%;
      height: 100%;
      display: block;
    }

    /* ── Transiciones de entrada ───────────────────────────────────────────── */
    @keyframes inPop        { from { opacity: 0; transform: scale(0.75); }      to { opacity: 1; transform: none; } }
    @keyframes inFade       { from { opacity: 0; }                              to { opacity: 1; } }
    @keyframes inZoom       { from { opacity: 0; transform: scale(0.4); }       to { opacity: 1; transform: none; } }
    @keyframes inSlideUp    { from { opacity: 0; transform: translateY(50px); } to { opacity: 1; transform: none; } }
    @keyframes inSlideDown  { from { opacity: 0; transform: translateY(-50px); }to { opacity: 1; transform: none; } }
    @keyframes inSlideLeft  { from { opacity: 0; transform: translateX(50px); } to { opacity: 1; transform: none; } }
    @keyframes inSlideRight { from { opacity: 0; transform: translateX(-50px); }to { opacity: 1; transform: none; } }

    /* ── Transiciones de salida ────────────────────────────────────────────── */
    @keyframes outPop        { from { opacity: 1; transform: none; } to { opacity: 0; transform: scale(0.75); } }
    @keyframes outFade       { from { opacity: 1; }                  to { opacity: 0; } }
    @keyframes outZoom       { from { opacity: 1; transform: none; } to { opacity: 0; transform: scale(0.4); } }
    @keyframes outSlideUp    { from { opacity: 1; transform: none; } to { opacity: 0; transform: translateY(-50px); } }
    @keyframes outSlideDown  { from { opacity: 1; transform: none; } to { opacity: 0; transform: translateY(50px); } }
    @keyframes outSlideLeft  { from { opacity: 1; transform: none; } to { opacity: 0; transform: translateX(-50px); } }
    @keyframes outSlideRight { from { opacity: 1; transform: none; } to { opacity: 0; transform: translateX(50px); } }
  </style>
</head>
<body>
  <div id="overlay"></div>

  <script>
    // ── Constants ────────────────────────────────────────────────────────────
    const WS_URL              = 'ws://localhost:3001/';
    const WS_RECONNECT_DELAY  = 3000;  // ms
    const MAX_POS_ATTEMPTS    = 30;
    const CONFIG_PATH         = './config.json';
    const REMOVE_ANIM_BUDGET  = 500;   // ms fallback after the out-animation is applied

    // ── Transiciones (mismo set que ofrece el panel) ──────────────────────────
    // key → string CSS `animation`. "none" = sin animación (instantáneo).
    const IN_ANIMS = {
      pop:        'inPop 0.25s cubic-bezier(0.34, 1.56, 0.64, 1) forwards',
      fade:       'inFade 0.3s ease-out forwards',
      zoom:       'inZoom 0.35s ease-out forwards',
      slideUp:    'inSlideUp 0.35s cubic-bezier(0.22, 1, 0.36, 1) forwards',
      slideDown:  'inSlideDown 0.35s cubic-bezier(0.22, 1, 0.36, 1) forwards',
      slideLeft:  'inSlideLeft 0.35s cubic-bezier(0.22, 1, 0.36, 1) forwards',
      slideRight: 'inSlideRight 0.35s cubic-bezier(0.22, 1, 0.36, 1) forwards'
    };
    const OUT_ANIMS = {
      pop:        'outPop 0.25s ease-in forwards',
      fade:       'outFade 0.3s ease-in forwards',
      zoom:       'outZoom 0.3s ease-in forwards',
      slideUp:    'outSlideUp 0.35s ease-in forwards',
      slideDown:  'outSlideDown 0.35s ease-in forwards',
      slideLeft:  'outSlideLeft 0.35s ease-in forwards',
      slideRight: 'outSlideRight 0.35s ease-in forwards'
    };

    // ── State ────────────────────────────────────────────────────────────────
    let config = {
      rewards:   {},
      safeZones: { exclude: [] },
      canvas:    { width: 1920, height: 1080 }
    };
    let ws = null;
    let wsReconnectTimer = null;

    // ── Logging ──────────────────────────────────────────────────────────────
    const log   = (...a) => console.log('[Overlay]', ...a);
    const logWS = (...a) => console.log('[WS]',      ...a);
    const warn  = (...a) => console.warn('[Overlay]', ...a);
    const err   = (...a) => console.error('[Overlay]', ...a);

    // ── Config ───────────────────────────────────────────────────────────────
    async function loadConfig() {
      try {
        const res = await fetch(CONFIG_PATH + '?t=' + Date.now());
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const raw = await res.json();
        config = {
          rewards:   raw.rewards   || {},
          safeZones: raw.safeZones || { exclude: [] },
          canvas:    raw.canvas    || { width: 1920, height: 1080 }
        };
        const w = config.canvas.width;
        const h = config.canvas.height;
        document.documentElement.style.cssText = `width:${w}px;height:${h}px`;
        document.body.style.cssText            = `width:${w}px;height:${h}px`;
        log(`Config loaded — ${Object.keys(config.rewards).length} reward(s), canvas ${w}×${h}`);
      } catch (e) {
        err('Failed to load config:', e.message, '— using empty config');
      }
    }

    // ── Safe-zone helpers ────────────────────────────────────────────────────
    function rectsOverlap(ax, ay, aw, ah, bx, by, bw, bh) {
      return ax < bx + bw && ax + aw > bx && ay < by + bh && ay + ah > by;
    }

    function randomPosition(vidW, vidH, respectSafeZones) {
      const cW = config.canvas.width;
      const cH = config.canvas.height;
      const maxX = Math.max(0, cW - vidW);
      const maxY = Math.max(0, cH - vidH);
      const zones = respectSafeZones
        ? (config.safeZones && config.safeZones.exclude) || []
        : [];

      for (let i = 0; i < MAX_POS_ATTEMPTS; i++) {
        const x = Math.floor(Math.random() * (maxX + 1));
        const y = Math.floor(Math.random() * (maxY + 1));
        if (!zones.some(z => rectsOverlap(x, y, vidW, vidH, z.x, z.y, z.width, z.height))) {
          return { x, y };
        }
      }
      warn(`No safe position after ${MAX_POS_ATTEMPTS} attempts — spawning anyway`);
      return {
        x: Math.floor(Math.random() * (maxX + 1)),
        y: Math.floor(Math.random() * (maxY + 1))
      };
    }

    // ── Video spawning ───────────────────────────────────────────────────────
    function spawnVideo(rewardName) {
      const rc = config.rewards[rewardName];
      if (!rc) { warn(`No mapping for reward: "${rewardName}"`); return; }

      const videos = rc.videos;
      if (!videos || videos.length === 0) { warn(`No videos for reward: "${rewardName}"`); return; }

      // playback mode: "all" spawns every video at once, otherwise pick 1 at random.
      const playAll = rc.playback === 'all';
      const chosen  = playAll ? videos.slice() : [videos[Math.floor(Math.random() * videos.length)]];
      log(`Spawning "${rewardName}" (${playAll ? 'all' : 'random'}) → ${chosen.length} video(s)`);
      chosen.forEach(src => spawnOne(rewardName, rc, src));
    }

    function spawnOne(rewardName, rc, src) {
      const width          = rc.width       || 480;
      const height         = rc.height      || 270;
      const volume         = rc.volume      !== undefined ? Math.min(1, Math.max(0, rc.volume)) : 1.0;
      const maxDuration    = rc.maxDuration || 30000;
      const respectZones   = rc.respectSafeZones !== false;
      const animIn         = rc.animIn  || 'pop';   // default = comportamiento previo
      const animOut        = rc.animOut || 'pop';

      const { x, y } = randomPosition(width, height, respectZones);
      log(`  → ${src}  vol=${volume}  pos=(${x},${y})`);

      const wrapper = document.createElement('div');
      wrapper.className = 'video-spawn';
      Object.assign(wrapper.style, {
        left:   x + 'px',
        top:    y + 'px',
        width:  width  + 'px',
        height: height + 'px'
      });
      if (animIn !== 'none' && IN_ANIMS[animIn]) wrapper.style.animation = IN_ANIMS[animIn];

      const video = document.createElement('video');
      video.src         = src;
      video.volume      = volume;
      video.autoplay    = true;
      video.playsInline = true;

      video.addEventListener('loadedmetadata', () => {
        const vw = video.videoWidth;
        const vh = video.videoHeight;
        if (!vw || !vh) return;
        // Scale to fit within configured max width/height preserving aspect ratio
        const scale = Math.min(width / vw, height / vh);
        const fw = Math.round(vw * scale);
        const fh = Math.round(vh * scale);
        wrapper.style.width  = fw + 'px';
        wrapper.style.height = fh + 'px';
        // Clamp position so it stays within canvas
        const cx = Math.max(0, Math.min(parseInt(wrapper.style.left), config.canvas.width  - fw));
        const cy = Math.max(0, Math.min(parseInt(wrapper.style.top),  config.canvas.height - fh));
        wrapper.style.left = cx + 'px';
        wrapper.style.top  = cy + 'px';
      });

      let cleaning = false;
      function cleanup() {
        if (cleaning) return;   // 'ended' + safety timer pueden dispararse juntos
        cleaning = true;
        clearTimeout(safetyTimer);
        const removeEl = () => { if (wrapper.parentNode) wrapper.remove(); };
        const out = OUT_ANIMS[animOut];
        if (animOut !== 'none' && out) {
          wrapper.style.animation = out;
          wrapper.addEventListener('animationend', removeEl, { once: true });
          setTimeout(removeEl, REMOVE_ANIM_BUDGET);
        } else {
          removeEl();
        }
      }

      const safetyTimer = setTimeout(() => {
        warn(`Safety timeout hit for: ${src}`);
        cleanup();
      }, maxDuration);

      video.addEventListener('ended', cleanup);
      video.addEventListener('error', () => { err(`Video error: ${src}`); cleanup(); });

      wrapper.appendChild(video);
      document.getElementById('overlay').appendChild(wrapper);
    }

    // Exposed for manual console testing (step 8.3 of planning doc)
    window.spawnVideo = spawnVideo;

    // ── WebSocket ────────────────────────────────────────────────────────────
    function connect() {
      if (ws) {
        ws.onclose = ws.onerror = null;
        try { ws.close(); } catch (_) {}
        ws = null;
      }

      logWS('Connecting to', WS_URL);
      ws = new WebSocket(WS_URL);

      ws.onopen = () => {
        logWS('Connected to admin server');
        clearTimeout(wsReconnectTimer);
      };

      ws.onmessage = (ev) => {
        let msg;
        try { msg = JSON.parse(ev.data); } catch (_) { return; }
        const event = msg.event;
        const data  = msg.data;
        if (!event || !data) return;
        if (event.source === 'General' && event.type === 'Custom'
            && data.action === 'playVideo' && data.reward) {
          log(`playVideo: "${data.reward}" por ${data.user || '?'}`);
          spawnVideo(data.reward);
        } else if (data.action === 'reloadConfig') {
          log('Config reload solicitado por el panel');
          loadConfig();
        }
      };

      ws.onclose = (ev) => {
        logWS(`Disconnected (code ${ev.code}) — retry in ${WS_RECONNECT_DELAY}ms`);
        wsReconnectTimer = setTimeout(connect, WS_RECONNECT_DELAY);
      };

      ws.onerror = () => logWS('Error (will reconnect on close)');
    }

    // ── Hotkeys ──────────────────────────────────────────────────────────────
    document.addEventListener('keydown', async (e) => {
      if (e.key === 'r' || e.key === 'R') {
        log('Hot-reloading config…');
        await loadConfig();
      }
    });

    // ── Init ─────────────────────────────────────────────────────────────────
    (async () => {
      await loadConfig();
      connect();
      log('Ready. Use spawnVideo("reward name") in DevTools console to test.');
    })();
  </script>
</body>
</html>
